<section class="space-y-6">
  <div class="flex items-start justify-between gap-4 flex-wrap">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-primary-600 dark:text-primary-400">Operations</p>
      <h1 class="text-2xl md:text-3xl font-bold text-neutral-900 dark:text-white mt-2">Inventory</h1>
      <p class="text-neutral-600 dark:text-neutral-400 mt-2 max-w-3xl">Track stock items, prices, and branch allocation from one place.</p>
    </div>

    <div class="flex items-center gap-3">
      <button class="btn btn-ghost" type="button" (click)="loadData()">Refresh</button>
      <button class="btn btn-primary" type="button" (click)="openCreate()">+ New Item</button>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
    <div class="card" *ngFor="let stat of [
      { label: 'Total', value: stats().total },
      { label: 'Active', value: stats().active },
      { label: 'Low Stock', value: stats().lowStock },
      { label: 'Out of Stock', value: stats().outOfStock }
    ]">
      <div class="card-body p-5">
        <p class="text-sm text-neutral-600 dark:text-neutral-400">{{ stat.label }}</p>
        <p class="text-2xl font-bold text-neutral-900 dark:text-white mt-2">{{ stat.value }}</p>
      </div>
    </div>
  </div>

  <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>

  <app-inventory-list
    [items]="records()"
    [loading]="loading()"
    (edit)="openEdit($event)"
    (remove)="remove($event)"
  ></app-inventory-list>

  <div *ngIf="modalOpen()" class="fixed inset-0 z-50 bg-slate-950/60 p-4 flex items-center justify-center">
    <div class="w-full max-w-4xl">
      <app-inventory-form
        [form]="form"
        [mode]="modalMode()"
        (cancel)="closeModal()"
      ></app-inventory-form>

      <div class="mt-4 flex justify-end gap-3">
        <button class="btn btn-ghost" type="button" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" type="button" (click)="save()">{{ saving() ? 'Saving...' : (modalMode() === 'create' ? 'Create' : 'Update') }}</button>
      </div>
    </div>
  </div>
</section>
