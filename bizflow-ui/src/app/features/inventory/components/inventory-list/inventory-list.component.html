<div class="card border border-neutral-200/70 dark:border-neutral-800">
  <div class="card-header flex items-center justify-between gap-3 flex-wrap">
    <div>
      <h2 class="text-lg font-semibold text-neutral-900 dark:text-white">Inventory Records</h2>
      <p class="text-sm text-neutral-600 dark:text-neutral-400">Review items, quantities, and stock levels.</p>
    </div>
  </div>

  <div class="card-body p-0">
    <div *ngIf="loading" class="p-6 text-sm text-neutral-500 dark:text-neutral-400">Loading inventory...</div>

    <div *ngIf="!loading && !items.length" class="p-6 text-sm text-neutral-500 dark:text-neutral-400">
      No inventory items found.
    </div>

    <div *ngIf="!loading && items.length" class="overflow-x-auto">
      <table class="table min-w-full">
        <thead>
          <tr>
            <th>Name</th>
            <th>SKU</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Status</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of items">
            <td>
              <div class="font-semibold text-neutral-900 dark:text-white">{{ item.name }}</div>
              <div class="text-xs text-neutral-500 dark:text-neutral-400">{{ item.location || 'No location set' }}</div>
            </td>
            <td>{{ item.sku }}</td>
            <td>{{ item.category || 'General' }}</td>
            <td>{{ item.quantity }}</td>
            <td>
              <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary-100 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300">
                {{ item.status }}
              </span>
            </td>
            <td>
              <div class="flex justify-end gap-2">
                <button type="button" class="btn btn-ghost btn-sm" (click)="edit.emit(item)">Edit</button>
                <button type="button" class="btn btn-danger btn-sm" (click)="remove.emit(item._id)">Delete</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
