<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 p-4">
  <div>
    <label class="block text-sm font-medium mb-1">Supplier (optional)</label>
    <select formControlName="supplierId" class="input">
      <option value="">No supplier</option>
      <option *ngFor="let s of suppliers" [value]="s._id">{{ s.name }}</option>
    </select>
  </div>

  <label class="block space-y-2">
    <span class="text-sm font-medium">Description</span>
    <input formControlName="description" class="input" />
  </label>

  <label class="block space-y-2">
    <span class="text-sm font-medium">Amount</span>
    <input type="number" formControlName="amount" class="input" />
  </label>

  <div class="text-right">
    <button type="submit" [disabled]="form.invalid" class="btn btn-primary">Save Expense</button>
  </div>
</form>
